<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us – Bonterra Trattoria</title>
    <meta name="description" content="Get in touch with Bonterra Trattoria for reservations, private events, or any questions." />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta property="og:title" content="Contact Us – Bonterra Trattoria" />
    <meta property="og:description" content="Get in touch with Bonterra Trattoria for reservations, private events, or any questions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bonterra-website.pages.dev/contact.html" />
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://bonterra-website.pages.dev/" },
        { "@type": "ListItem", "position": 2, "name": "Contact", "item": "https://bonterra-website.pages.dev/contact.html" }
      ]
    }
    </script>
</head>
<body>

    <div id="loader">...</div>
    <div class="custom-cursor" id="customCursor">...</div>

    <header><nav class="navbar" id="navbar">...</nav></header>

    <main>
        <section style="padding:140px 60px 80px;background:var(--cream);">
            <h1 style="font-family:'Playfair Display',serif;font-size:clamp(2.8rem,6vw,4.2rem);font-weight:600;margin-bottom:12px;">Contact <span style="color:var(--gold);">Us</span></h1>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:60px;max-width:1200px;margin:40px auto 0;">
                <div class="reveal-left">
                    <h3>Get in Touch</h3>
                    <p style="margin:20px 0;font-size:1.05rem;color:var(--espresso);">We'd love to hear from you – whether you have a question, want to book a table, or plan a special event.</p>
                    <div style="margin:20px 0;"><strong>Address:</strong> 1016 8 Street SW, Calgary, AB T2R 1K2</div>
                    <div><strong>Phone:</strong> <a href="tel:+14032628480" style="color:var(--gold);">(403) 262-8480</a></div>
                    <div><strong>Email:</strong> <a href="mailto:info@bonterra.ca" style="color:var(--gold);">info@bonterra.ca</a></div>
                    <div style="margin-top:20px;"><strong>Events:</strong> <a href="mailto:events@creativeri.com" style="color:var(--gold);">events@creativeri.com</a></div>
                </div>
                <div class="reveal-right">
                    <form action="https://formspree.io/f/mpqvljgz" method="POST" class="contact-form">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" name="name" required />
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required />
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" />
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;background:var(--gold);color:var(--charcoal);border-color:var(--gold);">Send Message <span class="arrow">→</span></button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>...</footer>
    <script src="script.js"></script>
</body>
</html>
