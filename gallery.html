    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <meta property="og:title" content="Gallery – Bonterra Trattoria" />
    <meta property="og:description" content="A visual journey through Bonterra Trattoria – candlelit interiors, handmade pasta, and Tuscan ambiance." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bonterra-website.pages.dev/gallery.html" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://bonterra-website.pages.dev/" },
        { "@type": "ListItem", "position": 2, "name": "Gallery", "item": "https://bonterra-website.pages.dev/gallery.html" }
      ]
    }
    </script>
</head>
<body>

    <div id="loader">...</div>
    <div class="custom-cursor" id="customCursor">...</div>

    <header><nav class="navbar" id="navbar">...</nav></header>

    <main>
        <section style="padding:140px 60px 80px;background:var(--cream);">
            <h1 style="font-family:'Fraunces',serif;font-size:clamp(2.8rem,6vw,4.2rem);font-weight:600;margin-bottom:12px;">A Visual <span style="color:var(--bronze);">Journey</span></h1>
            <p style="font-size:1.1rem;color:var(--espresso);max-width:500px;margin-bottom:40px;">Glimpses of the warmth, craftsmanship, and beauty that define Bonterra.</p>
            <div class="gallery-grid" style="display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:260px;gap:18px;margin-top:40px;">
                <div class="g-item" style="grid-column:span 2;grid-row:span 2;"><img src="images/2-810x420.png" alt="Bonterra pasta dish" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item"><img src="images/IMG_5061-940x420.jpg" alt="Bonterra interior" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item"><img src="images/IMG_9830-min-940x420.jpg" alt="Bonterra food presentation" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item"><img src="images/IMG_9889-min-940x420.jpg" alt="Bonterra dining" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item" style="grid-column:span 2;grid-row:span 1;"><img src="images/bonterra-wine-bar-560x420.jpg" alt="Bonterra wine bar" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item" style="grid-column:span 1;grid-row:span 2;"><img src="images/CMWeddingWeb4.jpg" alt="Bonterra atmosphere" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item"><img src="images/CMWeddingWeb2.jpg" alt="Bonterra candlelight" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
                <div class="g-item"><img src="images/2-810x420.png" alt="Bonterra dish" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>
            </div>
        </section>
    </main>

    <footer>...</footer>
    <script src="script.js"></script>
</body>
</html>
